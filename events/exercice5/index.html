<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Exercice 5</title>
        <style>
            .modern-form {
                max-width: 300px;
                display: flex;
                flex-direction: column;
                gap: 15px;
            }
            .form-group {
                display: flex;
                flex-direction: column;
            }
            input {
                padding: 8px;
                border: 1px solid #ccc;
                border-radius: 4px;
            }
            input.invalid {
                border-color: red;
            }
            .error-msg {
                color: red;
                font-size: 12px;
                height: 15px;
                margin-top: 5px;
            }
            .success {
                color: green;
                font-weight: bold;
                margin-top: 20px;
            }
            .hide {
                display: none;
            }
            button {
                padding: 10px;
                background: #28a745;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <form id="registerForm" class="modern-form">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" id="username" name="username"/>
                <span class="error-msg" id="errorName"></span>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" name="pass"/>
                <span class="error-msg" id="errorPwd"></span>
            </div>
            <button type="submit">Créer mon compte</button>
        </form>
        <div id="successMsg" class="success hide">Inscription réussie !</div>
        <script src="main.js"></script>
    </body>
</html>
